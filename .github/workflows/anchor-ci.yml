name: Anchor Build & Test

# programs/goalpost is developed without a local Rust/Solana/Anchor
# toolchain (see docs/ARCHITECTURE.md) - this workflow is the actual build
# and test verification for the program. Deploys are done manually via
# Solana Playground (beta.solpg.io), not from CI.
#
# Split into two jobs deliberately: actions/cache only saves on job
# *success* (its post-save hook is gated on success()), so while we're
# iterating on real anchor build/test failures, a toolchain-only job that
# has nothing else to fail lets the slow Solana CLI / anchor-cli installs
# actually get cached, instead of recompiling from scratch on every push.
#
# Tests run against real devnet (--skip-local-validator), not a local
# solana-test-validator - see Anchor.toml for why (two different unrelated
# local-validator startup crashes that didn't converge after real fix
# attempts; devnet-direct just works today, at the cost of speed/
# determinism and needing a funded wallet, restored here from the
# DEVNET_WALLET_SECRET_KEY repo secret). This requires programs/goalpost to
# actually be deployed to devnet first (manually, via Solana Playground -
# see docs/DEPLOY.md) - until that happens this job is expected to fail at
# `anchor test` with a program-not-found-style error, not a toolchain issue.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  # Solana 2.1.0's bundled cargo-build-sbf toolchain ships an old Cargo
  # (1.79.0) that can't build crates.io dependencies requiring edition2024
  # (first failure: block-buffer v0.12.1). Pinned to the current stable
  # Agave release instead - check https://github.com/anza-xyz/agave/releases
  # for the latest tag if this needs bumping again.
  SOLANA_VERSION: "4.1.1"
  ANCHOR_VERSION: "0.32.1"

jobs:
  toolchain:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install system build dependencies
        # anchor-cli pulls in the Ledger hardware-wallet stack (hidapi),
        # whose build script requires the libudev system library via
        # pkg-config - not present on the bare ubuntu-latest runner.
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Solana CLI install
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: solana-cli-${{ runner.os }}-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI
        if: steps.cache-solana.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"

      - name: Cache Anchor CLI binary
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/anchor
          key: anchor-cli-${{ runner.os }}-${{ env.ANCHOR_VERSION }}

      - name: Install Anchor CLI
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked

  anchor-test:
    needs: toolchain
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system build dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and git checkouts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Restore Solana CLI install
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: solana-cli-${{ runner.os }}-${{ env.SOLANA_VERSION }}

      - name: Add Solana CLI to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Restore Anchor CLI binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/anchor
          key: anchor-cli-${{ runner.os }}-${{ env.ANCHOR_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11.x requires Node >= 22.13 (see pnpm-workspace.yaml /
          # package.json packageManager) - Node 20 fails at pnpm's own
          # store-path check before anything in this repo even runs.
          node-version: "22"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore the funded devnet wallet
        env:
          DEVNET_WALLET_SECRET_KEY: ${{ secrets.DEVNET_WALLET_SECRET_KEY }}
        run: |
          mkdir -p ~/.config/solana
          echo "$DEVNET_WALLET_SECRET_KEY" > ~/.config/solana/id.json

      - name: Restore the committed program keypair (keeps program ID == declare_id!)
        run: |
          mkdir -p target/deploy
          cp programs/goalpost/keys/goalpost-keypair.json target/deploy/goalpost-keypair.json

      - name: anchor build
        run: anchor build

      - name: anchor test
        run: anchor test --skip-local-validator
