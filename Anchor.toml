[toolchain]

[features]
resolution = true
skip-lint = false

[programs.devnet]
goalpost = "6e6iXff86RZ6ryB7TeJSdn4GfGNDM5xtRz9h1oBQzLNr"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

# PIVOT (see docs/OPEN_QUESTIONS.md "Answered": local test-validator
# abandoned): `anchor test --skip-local-validator` runs tests directly
# against real devnet - the real TxLINE program and the real
# daily_scores_merkle_roots account are already there, so no cloning is
# needed at all. `wallet` above must be a real, SOL-funded devnet keypair
# (CI reconstructs it from the DEVNET_WALLET_SECRET_KEY secret - the same
# wallet Phase 0's recon script funded and used).
#
# Previously this ran a local solana-test-validator seeded via
# [test.validator.clone] from devnet, which would have been faster/free/
# deterministic - abandoned after two different unrelated startup crashes
# ("UnspecifiedIpAddr(0.0.0.0)" gossip panic, then a second run where the
# validator process didn't even reach genesis) that didn't converge after
# real fix attempts. Devnet-direct trades that speed/determinism for
# actually running today - real transaction fees are paid from the funded
# wallet (this is free-tier devnet SOL, not real money) and tests are
# subject to devnet's actual latency/finality instead of a local
# validator's near-instant blocks.
